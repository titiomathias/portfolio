<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>Matheus de Alencar</title>
        <!-- BOOTSTRAP -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
        <!-- JQUERY -->
        <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick.css"/>
        <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick-theme.css"/>
        <!-- CSS Personalizado -->
        <link rel="stylesheet" href="css/style.css">
        <style>
            .slick-slide img {
                margin: 0 auto;
            }
        </style>
    </head>
    <body id="body">
        <header class="header">
            <nav class="navbar navbar-expand-lg navbar-light bg-light">
                <div id="name">
                    MATHEUS DE ALENCAR
                </div>
                <div class="menu-items">
                    <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNavAltMarkup" aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                    </button>
                    <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
                    <div class="navbar-nav">
                        <a class="nav-item nav-link" href="#inicio">INÍCIO</a>
                        <a class="nav-item nav-link" href="#habilidades">HABILIDADES</a>
                        <a class="nav-item nav-link" href="#projetos">PROJETOS</a>
                        <a class="nav-item nav-link" href="#feedbacks">FEEDBACKS</a>
                        <a class="nav-item nav-link" href="#contato">CONTATO</a>
                    </div>
                    </div>
                </div>
            </nav>
        </header>
        <main>
            <div id="inicio">
                <div class="img-about-me">
                    <img src="img/Engenharia.png" alt="Engenharia" class="img-about-me">
                </div>
                <div class="txt-about-me">
                    <h2>Olá, eu sou o Matheus!</h2>
                    <h3></h3>
                </div>
            </div>
            <div id="habilidades">
                <div class="skills-select">
                    <h2>HARD SKILLS</h2>
                    <h2>SOFT SKILLS</h2>
                </div>
                <div class="hardskills">
                    <div class="carousel">
                        <div class="skill-container">
                            <div class="skill-bar html">
                                <img src="https://raw.githubusercontent.com/github/explore/80688e429a7d4ef2fca1e82350fe8e3517d3494d/topics/html/html.png" width="100px">
                            </div>
                        </div>
                        
                        <div class="skill-container">
                            <div class="skill-bar css">
                                <img src="https://raw.githubusercontent.com/github/explore/80688e429a7d4ef2fca1e82350fe8e3517d3494d/topics/css/css.png" alt="CSS3" width="100px">
                            </div>
                        </div>
                        
                        <div class="skill-container">
                            <div class="skill-bar js">
                                <img src="https://raw.githubusercontent.com/github/explore/80688e429a7d4ef2fca1e82350fe8e3517d3494d/topics/javascript/javascript.png" alt="JavaScript" width="100px">
                            </div>
                        </div>
                        
                        <div class="skill-container">
                            <div class="skill-bar python">
                                <img src="https://raw.githubusercontent.com/github/explore/80688e429a7d4ef2fca1e82350fe8e3517d3494d/topics/python/python.png" alt="python" width="100px">
                            </div>
                        </div>
                        
                        <div class="skill-container">
                            <div class="skill-bar php">
                                <img src="https://raw.githubusercontent.com/github/explore/80688e429a7d4ef2fca1e82350fe8e3517d3494d/topics/php/php.png" alt="PHP" width="100px">
                            </div>
                        </div>
                    </div>
                </div>
                <div class="softskills">

                </div>
            </div>
            <div id="projetos">
                <h1>Projetos</h1>
            </div>
            <div id="feedbacks">
                <h1>Feedbacks</h1>
            </div>
            <div id="contato">
                <h1>Contato</h1>
            </div>
        </main>
        <footer>
            Rodapé
        </footer>
        <script src="js/main.js"></script>
        <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick.min.js"></script>
        <script>
            $('.carousel').slick({
                centerMode: true,
                centerPadding: '0px',
                autoplay: true,
                autoplaySpeed: 1500,
                slidesToShow: 3,
                responsive: [
                    {
                    breakpoint: 768,
                    settings: {
                        arrows: false,
                        centerMode: true,
                        centerPadding: '40px',
                        slidesToShow: 3
                    }
                    },
                    {
                    breakpoint: 480,
                    settings: {
                        arrows: false,
                        centerMode: true,
                        centerPadding: '40px',
                        slidesToShow: 1
                    }
                    }
                ]
                });
        </script>
    </body>
</html>
